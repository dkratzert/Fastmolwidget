# This workflow publishes the package to TestPyPI when a version tag is pushed.
# Tag format must be: version-X.Y.Z

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Publish package Pypi

on:
  push:
    tags:
      - 'version-*'

permissions:
  contents: read

jobs:
  tests:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Test with pytest
        run: uv run pytest tests

  release-build:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-14        # arm64 + x86_64 via universal2
            macos_deployment_target: "14.0"
          - os: windows-latest

    # Build and publish are gated on successful tests.
    needs:
      - tests

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6

      - name: Validate tag matches project version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^version-[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$tag' does not match required pattern version-X.Y.Z"
            exit 1
          fi

          project_version=$(python - <<'PY'
          import pathlib, re
          # pyproject.toml uses dynamic versioning; the canonical version is in __init__.py
          content = pathlib.Path('src/fastmolwidget/__init__.py').read_text(encoding='utf-8')
          m = re.search(r'^__version__\s*=\s*"([^"]+)"', content, flags=re.MULTILINE)
          if not m:
              raise SystemExit('Could not find __version__ in src/fastmolwidget/__init__.py')
          print(m.group(1))
          PY
          )

          tag_version="${tag#version-}"
          if [[ "$tag_version" != "$project_version" ]]; then
            echo "Tag version '$tag_version' does not match pyproject version '$project_version'"
            exit 1
          fi

          echo "Tag and project version are consistent: $project_version"

      # Add -fopenmp for macOS builds to enable OpenMP support.
      - name: Install OpenMP on macOS
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Set MACOSX_DEPLOYMENT_TARGET for ARM builds
        if: matrix.macos_deployment_target
        run: echo "MACOSX_DEPLOYMENT_TARGET=${{ matrix.macos_deployment_target }}" >> "$GITHUB_ENV"

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4
        with:
            output-dir: dist

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: release-dists-${{ matrix.os }}
          path: dist/

  pypi-publish:
    needs:
      - release-build
    name: publish
    runs-on: ubuntu-latest
    environment:
      name: publish
      url: https://pypi.org/p/fastmolwidget
    permissions:
      contents: read
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: release-dists-*
          path: dist/
          merge-multiple: true
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
